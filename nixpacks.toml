# Nixpacks configuration for Railway
# Railway will automatically detect and use this instead of Dockerfile

# Build phase
[nixpacks.build]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.txt"
]

# Start command
[nixpacks.start]
cmd = "python main.py"

# Environment variables that must be set for build
[nixpacks.variables]
PYTHON_VERSION = "3.11"
